services:
  - type: web
    name: collector-api-gateway
    runtime: docker
    dockerfilePath: ./services/api-gateway/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_SERVICE_URL
        value: https://collector-auth-service.onrender.com
      - key: CATALOG_SERVICE_URL
        value: https://collector-catalog-service.onrender.com
      - key: ARTICLE_SERVICE_URL
        value: https://collector-article-service.onrender.com
      - key: AUDIT_SERVICE_URL
        value: https://collector-audit-service.onrender.com
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: collector-auth-service
    runtime: docker
    dockerfilePath: ./services/auth-service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AUDIT_SERVICE_URL
        value: https://collector-audit-service.onrender.com

  - type: web
    name: collector-catalog-service
    runtime: docker
    dockerfilePath: ./services/catalog-service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AUDIT_SERVICE_URL
        value: https://collector-audit-service.onrender.com

  - type: web
    name: collector-article-service
    runtime: docker
    dockerfilePath: ./services/article-service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: AUDIT_SERVICE_URL
        value: https://collector-audit-service.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://collector-notification-service.onrender.com

  - type: web
    name: collector-audit-service
    runtime: docker
    dockerfilePath: ./services/audit-service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false

  - type: web
    name: collector-notification-service
    runtime: docker
    dockerfilePath: ./services/notification-service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: AUTH_SERVICE_URL
        value: https://collector-auth-service.onrender.com
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: NOTIFICATIONS_PROVIDER
        value: logger
      - key: NOTIFICATIONS_FROM_EMAIL
        sync: false
      - key: NOTIFICATIONS_TEST_RECIPIENT
        sync: false
      - key: RESEND_API_KEY
        sync: false

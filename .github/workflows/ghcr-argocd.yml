name: ghcr-argocd

on:
  push:
    branches:
      - develop
      - preprod
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ghcr-argocd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute-vars:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.vars.outputs.branch_name }}
      overlay_name: ${{ steps.vars.outputs.overlay_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      latest_tag: ${{ steps.vars.outputs.latest_tag }}
      owner_lower: ${{ steps.vars.outputs.owner_lower }}

    steps:
      - name: Compute deployment variables
        id: vars
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          owner_lower=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          branch_name="$GITHUB_REF_NAME"
          short_sha=$(echo "$GITHUB_SHA" | cut -c1-12)

          case "$branch_name" in
            develop) overlay_name="dev" ;;
            preprod) overlay_name="preprod" ;;
            main) overlay_name="prod" ;;
            *)
              echo "Unsupported branch: $branch_name" >&2
              exit 1
              ;;
          esac

          image_tag="${branch_name}-${short_sha}"
          latest_tag="${branch_name}-latest"

          echo "owner_lower=$owner_lower" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "overlay_name=$overlay_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

  build-and-publish:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    needs: compute-vars
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: collector-api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - image_name: collector-auth-service
            dockerfile: services/auth-service/Dockerfile
          - image_name: collector-catalog-service
            dockerfile: services/catalog-service/Dockerfile
          - image_name: collector-article-service
            dockerfile: services/article-service/Dockerfile
          - image_name: collector-audit-service
            dockerfile: services/audit-service/Dockerfile
          - image_name: collector-notification-service
            dockerfile: services/notification-service/Dockerfile
          - image_name: collector-frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.compute-vars.outputs.owner_lower }}/${{ matrix.image_name }}:${{ needs.compute-vars.outputs.image_tag }}
            ghcr.io/${{ needs.compute-vars.outputs.owner_lower }}/${{ matrix.image_name }}:${{ needs.compute-vars.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-kustomize:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    needs:
      - compute-vars
      - build-and-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update overlay image tags
        run: |
          python3 scripts/ci/update_kustomize_images.py \
            "infra/k8s/overlays/${{ needs.compute-vars.outputs.overlay_name }}/kustomization.yaml" \
            "${{ needs.compute-vars.outputs.owner_lower }}" \
            "${{ needs.compute-vars.outputs.image_tag }}" \
            "${{ needs.compute-vars.outputs.latest_tag }}"

      - name: Commit and push manifest update
        run: |
          if git diff --quiet -- infra/k8s/overlays/${{ needs.compute-vars.outputs.overlay_name }}/kustomization.yaml; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git add infra/k8s/overlays/${{ needs.compute-vars.outputs.overlay_name }}/kustomization.yaml
          git commit -m "chore(ci): update ${{ needs.compute-vars.outputs.overlay_name }} image tags [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

name: ci

on:
  pull_request:
  push:
    branches:
      - develop
      - preprod
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality-and-tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: collector
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d collector"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/collector?schema=public
      JWT_SECRET: ci-jwt-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Docker Compose configuration
        run: |
          cp .env.compose.example .env.compose
          docker compose config >/dev/null

      - name: Prepare database
        run: |
          npm run prisma:migrate:deploy -w backend
          npm run prisma:seed -w backend

      - name: Lint all workspaces
        run: npm run lint

      - name: Build all workspaces
        run: npm run build

      - name: Frontend tests
        run: npm run test -w frontend -- --runInBand

      - name: Backend tests
        run: npm run test -w backend -- --runInBand

      - name: Backend e2e tests
        run: npm run test:e2e -w backend

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: |
            backend/coverage
            frontend/coverage
          if-no-files-found: ignore

  security:
    name: dependency-vulnerability-scan
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: NPM audit (high/critical)
        run: npm audit --workspaces --include-workspace-root --audit-level=high

  sonar:
    name: sonarqube-cloud
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ vars.ENABLE_SONAR == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v7
        with:
          name: coverage-reports
          path: .

      - name: Verify coverage reports
        run: |
          test -f backend/coverage/lcov.info
          test -f frontend/coverage/lcov.info

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  playwright-smoke:
    name: playwright-smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm exec -w frontend playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e:playwright -w frontend

  compute-release-vars:
    name: compute-release-vars
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (github.ref_name == 'develop' || github.ref_name == 'preprod' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    needs:
      - quality
      - security
    outputs:
      branch_name: ${{ steps.vars.outputs.branch_name }}
      overlay_name: ${{ steps.vars.outputs.overlay_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      latest_tag: ${{ steps.vars.outputs.latest_tag }}
      owner_lower: ${{ steps.vars.outputs.owner_lower }}

    steps:
      - name: Compute deployment variables
        id: vars
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          owner_lower=$(echo "$REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          branch_name="$GITHUB_REF_NAME"
          short_sha=$(echo "$GITHUB_SHA" | cut -c1-12)

          case "$branch_name" in
            develop) overlay_name="dev" ;;
            preprod) overlay_name="preprod" ;;
            main) overlay_name="prod" ;;
            *)
              echo "Unsupported branch: $branch_name" >&2
              exit 1
              ;;
          esac

          image_tag="${branch_name}-${short_sha}"
          latest_tag="${branch_name}-latest"

          echo "owner_lower=$owner_lower" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"
          echo "overlay_name=$overlay_name" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

  build-and-publish-images:
    name: build-and-publish-images
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (github.ref_name == 'develop' || github.ref_name == 'preprod' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    needs: compute-release-vars
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: collector-api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - image_name: collector-auth-service
            dockerfile: services/auth-service/Dockerfile
          - image_name: collector-catalog-service
            dockerfile: services/catalog-service/Dockerfile
          - image_name: collector-article-service
            dockerfile: services/article-service/Dockerfile
          - image_name: collector-audit-service
            dockerfile: services/audit-service/Dockerfile
          - image_name: collector-notification-service
            dockerfile: services/notification-service/Dockerfile
          - image_name: collector-frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.compute-release-vars.outputs.owner_lower }}/${{ matrix.image_name }}:${{ needs.compute-release-vars.outputs.image_tag }}
            ghcr.io/${{ needs.compute-release-vars.outputs.owner_lower }}/${{ matrix.image_name }}:${{ needs.compute-release-vars.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops-manifests:
    name: update-gitops-manifests
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (github.ref_name == 'develop' || github.ref_name == 'preprod' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    needs:
      - compute-release-vars
      - build-and-publish-images

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update overlay image tags
        run: |
          python3 scripts/ci/update_kustomize_images.py \
            "infra/k8s/overlays/${{ needs.compute-release-vars.outputs.overlay_name }}/kustomization.yaml" \
            "${{ needs.compute-release-vars.outputs.owner_lower }}" \
            "${{ needs.compute-release-vars.outputs.image_tag }}" \
            "${{ needs.compute-release-vars.outputs.latest_tag }}"

      - name: Commit and push manifest update
        run: |
          if git diff --quiet -- infra/k8s/overlays/${{ needs.compute-release-vars.outputs.overlay_name }}/kustomization.yaml; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git add infra/k8s/overlays/${{ needs.compute-release-vars.outputs.overlay_name }}/kustomization.yaml
          git commit -m "chore(ci): update ${{ needs.compute-release-vars.outputs.overlay_name }} image tags [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

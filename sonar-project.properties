sonar.projectKey=collector-shop
sonar.projectName=collector-shop
sonar.sourceEncoding=UTF-8

sonar.sources=backend/src,frontend/app,frontend/components,frontend/lib
sonar.tests=backend/src,backend/test,frontend/app,frontend/components,frontend/lib,frontend/tests

sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/playwright-report/**,**/test-results/**
sonar.test.inclusions=backend/**/*.spec.ts,backend/**/*.e2e-spec.ts,frontend/**/*.test.ts,frontend/**/*.test.tsx,frontend/tests/e2e/**/*.ts

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

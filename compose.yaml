name: collector

x-node-service: &node-service
  env_file:
    - .env.compose
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp
  networks:
    - backend
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-node-healthcheck: &node-healthcheck
  interval: 15s
  timeout: 5s
  retries: 10
  start_period: 30s

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: collector-reverse-proxy
    depends_on:
      frontend:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./infra/compose/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: collector-postgres
    restart: unless-stopped
    env_file:
      - .env.compose
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collector}
      POSTGRES_USER: ${POSTGRES_USER:-collector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collector}
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=200ms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-migrate:
    <<: *node-service
    container_name: collector-auth-migrate
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    image: collector/auth-service:local
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - npm run prisma:migrate:deploy -w backend

  db-seed:
    <<: *node-service
    container_name: collector-db-seed
    profiles:
      - ops
    image: collector/auth-service:local
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
    restart: "no"
    command:
      - sh
      - -lc
      - cd /app && node backend/prisma/seed.js

  frontend:
    <<: *node-service
    container_name: collector-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: collector/frontend:local
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - edge
      - backend
    healthcheck:
      <<: *node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]

  api-gateway:
    <<: *node-service
    container_name: collector-api-gateway
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    image: collector/api-gateway:local
    environment:
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-change-me-with-a-long-random-secret}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      AUTH_SERVICE_URL: http://auth-service:3002
      CATALOG_SERVICE_URL: http://catalog-service:3003
      ARTICLE_SERVICE_URL: http://article-service:3004
      AUDIT_SERVICE_URL: http://audit-service:3005
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      article-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      <<: *node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null || exit 1"]

  auth-service:
    <<: *node-service
    container_name: collector-auth-service
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    image: collector/auth-service:local
    environment:
      PORT: 3002
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgresql://collector:collector@postgres:5432/collector?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-with-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-change-me}
      AUDIT_SERVICE_URL: http://audit-service:3005
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      audit-service:
        condition: service_healthy
    healthcheck:
      <<: *node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health >/dev/null || exit 1"]

  catalog-service:
    <<: *node-service
    container_name: collector-catalog-service
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    image: collector/catalog-service:local
    environment:
      PORT: 3003
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgresql://collector:collector@postgres:5432/collector?schema=public}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-change-me}
      AUDIT_SERVICE_URL: http://audit-service:3005
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      audit-service:
        condition: service_healthy
    healthcheck:
      <<: *node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health >/dev/null || exit 1"]

  article-service:
    <<: *node-service
    container_name: collector-article-service
    build:
      context: .
      dockerfile: services/article-service/Dockerfile
    image: collector/article-service:local
    environment:
      PORT: 3004
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgresql://collector:collector@postgres:5432/collector?schema=public}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-change-me}
      AUDIT_SERVICE_URL: http://audit-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
      audit-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      <<: *node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health >/dev/null || exit 1"]

  audit-service:
    <<: *node-service
    container_name: collector-audit-service
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    image: collector/audit-service:local
    environment:
      PORT: 3005
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgresql://collector:collector@postgres:5432/collector?schema=public}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-change-me}
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
    healthcheck:
      <<: *node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3005/health >/dev/null || exit 1"]

  notification-service:
    <<: *node-service
    container_name: collector-notification-service
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    image: collector/notification-service:local
    environment:
      PORT: 3006
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTH_SERVICE_URL: http://auth-service:3002
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-change-me}
      NOTIFICATIONS_PROVIDER: ${NOTIFICATIONS_PROVIDER:-logger}
      NOTIFICATIONS_FROM_EMAIL: ${NOTIFICATIONS_FROM_EMAIL:-no-reply@collector.local}
      NOTIFICATIONS_TEST_RECIPIENT: ${NOTIFICATIONS_TEST_RECIPIENT:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      <<: *node-healthcheck
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3006/health >/dev/null || exit 1"]

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: collector-prometheus
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      reverse-proxy:
        condition: service_healthy
      blackbox-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
      postgres-exporter:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: collector-grafana
    profiles:
      - observability
    env_file:
      - .env.compose
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3007}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/compose/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: collector-cadvisor
    profiles:
      - observability
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.26.0
    container_name: collector-blackbox-exporter
    profiles:
      - observability
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./infra/compose/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: collector-postgres-exporter
    profiles:
      - observability
    env_file:
      - .env.compose
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-collector}:${POSTGRES_PASSWORD:-collector}@postgres:5432/${POSTGRES_DB:-collector}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dozzle:
    image: amir20/dozzle:v8.10.7
    container_name: collector-dozzle
    profiles:
      - observability
    ports:
      - "${DOZZLE_PORT:-8088}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  trivy-fs:
    image: aquasec/trivy:0.61.0
    container_name: collector-trivy-fs
    profiles:
      - security
    command:
      - fs
      - --scanners
      - vuln,secret,misconfig
      - --severity
      - HIGH,CRITICAL
      - --exit-code
      - "1"
      - --no-progress
      - --format
      - table
      - /workspace
    volumes:
      - .:/workspace:ro
    networks:
      - backend

  gitleaks:
    image: ghcr.io/gitleaks/gitleaks:v8.24.2
    container_name: collector-gitleaks
    profiles:
      - security
    command:
      - detect
      - --source=/workspace
      - --no-banner
      - --redact
      - --report-format=sarif
      - --report-path=/reports/gitleaks.sarif
    volumes:
      - .:/workspace:ro
      - ./reports/security:/reports
    networks:
      - backend

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector-root-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/louis-cardon/collector.git
    targetRevision: develop
    path: infra/argocd/dev-bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

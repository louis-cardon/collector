apiVersion: 1

datasources:
  - name: Audit PostgreSQL
    uid: audit-postgres
    type: postgres
    access: proxy
    url: ${GRAFANA_AUDIT_DB_HOST}
    user: ${GRAFANA_AUDIT_DB_USER}
    secureJsonData:
      password: ${GRAFANA_AUDIT_DB_PASSWORD}
    jsonData:
      database: ${GRAFANA_AUDIT_DB_NAME}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
    editable: false

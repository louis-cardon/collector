limit_req_zone $binary_remote_addr zone=authlimit:10m rate=5r/m;

upstream frontend_upstream {
    server frontend:3000;
}

upstream api_gateway_upstream {
    server api-gateway:3001;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 5m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    location = /health {
        proxy_pass http://api_gateway_upstream/health;
    }

    location = /api/auth/login {
        limit_req zone=authlimit burst=10 nodelay;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://api_gateway_upstream;
    }

    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://api_gateway_upstream;
    }

    location /docs {
        proxy_pass http://api_gateway_upstream;
    }

    location / {
        proxy_pass http://frontend_upstream;
    }
}
